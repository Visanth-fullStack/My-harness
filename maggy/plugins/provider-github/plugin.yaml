id: provider-github
version: 1
entrypoint: plugin.py
permissions: [github.read, github.write]
hooks:
  - event: on_task_fetch
    handler: fetch_tasks
router: "plugin:router"
heartbeat:
  - name: github_inbox_poll
    interval_seconds: 300
    fn: poll_inbox
config:
  token_env: "GITHUB_TOKEN"
  org_env: "GITHUB_ORG"
  repos_env: "GITHUB_REPOS"
